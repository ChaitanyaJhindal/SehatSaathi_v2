services:
  - type: web
    name: sehatsaathi-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: sehatsaathi
      - key: GROQ_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
